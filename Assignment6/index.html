<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RinseUp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/logo.png" type="image/x-icon">
</head>

<body>
    <div class="container">

        <div class="image"><img src="landing_page.png" alt=""></div>
        <div class="form">
            <form action="">
                <h2>Let's get your laundry done</h2>
                <div class="email">

                    <label for="email">Email</label><input type="text" placeholder="abc@gmail.com" id="email" required>
                </div>
                <div class="password">

                    <label for="password">Password</label><input type="password" id="password" placeholder="Password"
                        required>
                    <div id="forgot"><a href="">Forgot Password ?</a></div>
                </div>
                <button type="submit">Login</button>
                <div>New to RinseUp ?<a href=""> Register Now</a></div>
            </form>
        </div>
    </div>
</body>

</html>
